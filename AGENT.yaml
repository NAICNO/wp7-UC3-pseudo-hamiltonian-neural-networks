# Pseudo-Hamiltonian Neural Networks - AI Agent Configuration
metadata:
  name: "Pseudo-Hamiltonian Neural Networks Demonstrator"
  version: "1.0"
  repository: "https://github.com/NAICNO/wp7-UC3-pseudo-hamiltonian-neural-networks"
  documentation: "https://naicno.github.io/wp7-UC3-pseudo-hamiltonian-neural-networks/"
  docs_source: "content/"
  description: "Structure-preserving neural networks for learning pseudo-Hamiltonian dynamical systems (ODEs and PDEs)"

prerequisites:
  - "SSH access to NAIC VM (via orchestrator.naic.no)"
  - "Python 3.8+"
  - "GPU recommended (NVIDIA) for training"

environment_check:
  - command: "python3 --version"
    expected: "Python 3.8+"
  - command: "python -c 'import phlearn; print(phlearn.__name__)'"
    expected: "phlearn"
  - command: "python -c 'import torch; print(torch.cuda.is_available())'"
    expected: "True (for GPU) or False (CPU-only)"

vm_init:
  script: "vm-init.sh"
  description: "One-time VM initialization (installs system packages, CUDA setup)"
  commands:
    - "curl -O https://raw.githubusercontent.com/NAICNO/wp7-UC3-pseudo-hamiltonian-neural-networks/main/vm-init.sh"
    - "chmod +x vm-init.sh"
    - "./vm-init.sh"

setup:
  script: "setup.sh"
  commands:
    - "git clone https://github.com/NAICNO/wp7-UC3-pseudo-hamiltonian-neural-networks.git"
    - "cd pseudo-hamiltonian-neural-networks"
    - "chmod +x setup.sh vm-init.sh"
    - "./setup.sh"
    - "source venv/bin/activate"

jupyter:
  start: "jupyter lab --no-browser --ip=0.0.0.0 --port=8888"
  tunnel_template: "ssh -v -N -L 8888:localhost:8888 -i YOUR_KEY_PATH ubuntu@YOUR_VM_IP"
  tunnel_example: "ssh -v -N -L 8888:localhost:8888 -i ~/.ssh/naic-vm.pem ubuntu@10.212.136.52"
  tunnel_note: "Replace YOUR_KEY_PATH and YOUR_VM_IP with actual values. Do NOT include angle brackets."
  notebook: "demonstrator-v1.orchestrator.ipynb"

example_scripts:
  train_model: "python example_scripts/train_model.py"
  spring_notebook: "jupyter lab example_scripts/spring_example.ipynb"
  kdv_notebook: "jupyter lab example_scripts/kdv_example.ipynb"
  note: "UC3 is primarily notebook-based. See example_scripts/train_model.py for CLI usage."

parameters:
  required: []
  optional:
    - name: "nstates"
      type: "integer"
      default: 2
      description: "Number of states in the dynamical system"
    - name: "damping"
      type: "float"
      default: 0.3
      range: [0.0, 1.0]
      description: "Damping coefficient for dissipative systems"
    - name: "epochs"
      type: "integer"
      default: 30
      range: [5, 200]
      description: "Number of training epochs"
    - name: "batch_size"
      type: "integer"
      default: 32
      range: [16, 256]
      description: "Training batch size"
    - name: "integrator"
      type: "string"
      default: "midpoint"
      choices: ["midpoint", "rk4", "euler", "false"]
      description: "Numerical integrator for time-stepping"
    - name: "hidden_dim"
      type: "integer"
      default: 100
      range: [20, 200]
      description: "Hidden layer dimension for neural network"
    - name: "ntrajectories"
      type: "integer"
      default: 300
      range: [5, 500]
      description: "Number of training trajectories to generate"
    - name: "tmax"
      type: "float"
      default: 10.0
      range: [1.0, 50.0]
      description: "Maximum simulation time"
    - name: "dt"
      type: "float"
      default: 0.1
      description: "Time step size for integration"
    - name: "seed"
      type: "integer"
      default: 42
      description: "Random seed for reproducibility"

models:
  - name: "phnn"
    class: "PseudoHamiltonianNN"
    type: "Structure-preserving"
    description: "Pseudo-Hamiltonian neural network that learns the Hamiltonian and dissipation"
  - name: "baseline"
    class: "DynamicSystemNN + BaselineNN"
    type: "Black-box"
    description: "Standard neural ODE baseline without Hamiltonian structure"
  - name: "phnn-forced"
    class: "PseudoHamiltonianNN with external forces"
    type: "Structure-preserving + forcing"
    description: "PHNN with learned external force terms for non-conservative systems"

systems:
  ode:
    - name: "mass-spring"
      description: "Damped mass-spring-damper system (2 states: position, momentum)"
      example: "example_scripts/spring_example.ipynb"
    - name: "tank"
      description: "Two-tank system with fluid flow dynamics"
      example: "example_scripts/phnn_ode_examples.ipynb"
  pde:
    - name: "kdv"
      description: "Korteweg-de Vries equation (soliton dynamics)"
      example: "example_scripts/kdv_example.ipynb"
    - name: "cahn-hilliard"
      description: "Cahn-Hilliard equation (phase separation)"
      example: "example_scripts/cahn_hilliard_example.ipynb"
    - name: "bbm"
      description: "Benjamin-Bona-Mahony equation (water waves)"
      example: "example_scripts/bbm_example.ipynb"
    - name: "kdv-burgers"
      description: "KdV-Burgers equation (dispersive-dissipative waves)"
      example: "example_scripts/kdv_burgers_example.ipynb"
    - name: "allen-cahn"
      description: "Allen-Cahn equation (reaction-diffusion)"
    - name: "perona-malik"
      description: "Perona-Malik equation (image denoising PDE)"
      example: "example_scripts/pm_example.ipynb"
    - name: "heat"
      description: "Heat equation (diffusion)"

directory_structure:
  notebook: "demonstrator-v1.orchestrator.ipynb"
  phlearn_library: "phlearn/"
  example_scripts: "example_scripts/"
  train_script: "example_scripts/train_model.py"
  results: "results/"
  tests: "tests/"
  widgets: "widgets.py"
  utils: "utils.py"

ssh_examples:
  login: "ssh -i ~/.ssh/naic-vm.pem ubuntu@10.212.136.52"
  jupyter_tunnel: "ssh -v -N -L 8888:localhost:8888 -i ~/.ssh/naic-vm.pem ubuntu@10.212.136.52"
  common_mistakes:
    - mistake: "Typing angle brackets literally: ubuntu@<VM_IP>"
      fix: "Replace with actual IP: ubuntu@10.212.136.52"
    - mistake: "Wrong key permissions"
      fix: "chmod 600 ~/.ssh/naic-vm.pem"
    - mistake: "SSH tunnel appears stuck"
      fix: "Normal behavior with -N flag. Open http://localhost:8888 in browser."

troubleshooting:
  - issue: "SSH Permission denied (publickey)"
    solution: "Check key permissions: chmod 600 ~/.ssh/your-key.pem"
  - issue: "Typed <VM_IP> literally in SSH command"
    solution: "Replace with actual IP from orchestrator.naic.no, e.g. ubuntu@10.212.136.52"
  - issue: "SSH tunnel hangs"
    solution: "This is normal with -N flag. Open http://localhost:8888 in your browser."
  - issue: "CUDA out of memory"
    solution: "Reduce batch_size or hidden_dim; use CPU for small experiments"
  - issue: "ModuleNotFoundError: No module named 'phlearn'"
    solution: "Activate venv and install: source venv/bin/activate && pip install -e phlearn"
  - issue: "Permission denied (scripts)"
    solution: "chmod +x setup.sh vm-init.sh"
  - issue: "No GPU detected"
    solution: "Check nvidia-smi; run vm-init.sh for CUDA setup"
  - issue: "ImportError: torch not found"
    solution: "pip install torch torchvision torchaudio"
  - issue: "PDE examples run slowly"
    solution: "Reduce spatial resolution or use GPU; PDE training is computationally intensive"

verification:
  - step: "phlearn imports correctly"
    command: "python -c 'from phlearn.phnns import PseudoHamiltonianNN; print(\"PHNN OK\")'"
    expected: "PHNN OK"
  - step: "ODE system works"
    command: "python -c 'from phlearn.phsystems.ode import MassSpringDamperSystem; print(\"ODE OK\")'"
    expected: "ODE OK"
  - step: "GPU is available"
    command: "python -c 'import torch; print(torch.cuda.is_available())'"
    expected: "True"
  - step: "Training script runs"
    command: "python example_scripts/train_model.py"
    expected: "Training completes without errors"
  - step: "Results directory exists"
    command: "ls results/"
    expected: "Directory exists (may be empty before first run)"
